<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>딥링크로 앱 열기</title>
        <script>
            function openApp() {
                // var customUrlScheme = "navercal://"; // Naver Calendar Custom Scheme
				// var endcodedURI = encodeURI("navercal://")
				// var customUrlScheme = "intent://settings#Intent;scheme=navercal;package=com.nhn.android.calendar.alpha;end";
				// var customUrlScheme = `https://m.calendar.naver.com/calapp/main.nhn`; // Naver Calendar Custom Scheme
				var customUrlScheme = `https://m.map.naver.com/appLink.naver?app=Y&-pinType=site&%20appname=com.nhn.android.nmap&appMenu=location&pin%20Id=1751384363&menu=location&version=2#applink`; // Naver Calendar Custom Scheme
                //var fallbackUrl =
                //    "https://m.calendar.naver.com/calapp/main.nhn"; // Naver Calendar Applink Scheme
				var fallbackUrl = "market://details?id=com.nhn.android.calendar" // 앱 마켓 연동시

                window.location.href = customUrlScheme;

                setTimeout(function () {
                    window.location.href = fallbackUrl;
                }, 2000);
            }

            document.addEventListener("DOMContentLoaded", function () {
                document.getElementById("openAppButton").onclick = openApp;
            });
        </script>
    </head>
    <body>
        <button id="openAppButton">앱 열기</button>
		<a href="https://m.calendar.naver.com/calapp/main.nhn">링크 클릭 테스트</a>    
		<p><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">유튜브 테스트</a></p>
	    <p><a href="https://x.com/elonmusk">X(트위터) 테스트</a></p>
	    <p><a href="https://www.instagram.com/instagram">인스타그램 테스트</a></p>
    </body>
</html>
